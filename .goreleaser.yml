version: 2

builds:
  - binary: liftoff-export
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w

archives:
  - formats:
      - zip
    name_template: "liftoff-export_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

homebrew_casks:
  - name: liftoff-export
    skip_upload: auto
    repository:
      owner: quantcli
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: https://github.com/quantcli/liftoff-export-cli
    description: CLI tool to export and analyze workout data from the Liftoff fitness app
    license: MIT
    url:
      verified: github.com/quantcli/liftoff-export-cli
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/liftoff-export"]
          end

release:
  replace_existing_artifacts: true
